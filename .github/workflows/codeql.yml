name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '24 16 * * 4'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'rust', 'java-kotlin' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    # Setup environments for compiled languages
    - name: Setup Node.js
      if: matrix.language == 'java-kotlin' || matrix.language == 'javascript'
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'

    - name: Setup Java
      if: matrix.language == 'java-kotlin'
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Rust
      if: matrix.language == 'rust' || matrix.language == 'java-kotlin'
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        target: aarch64-linux-android

    - name: Install dependencies
      if: matrix.language == 'java-kotlin' || matrix.language == 'javascript'
      run: npm ci

    # Initialize CodeQL
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    # Manual build for Java/Kotlin
    # CodeQL needs the code to be compiled to analyze Java/Kotlin
    - name: Build Android (for CodeQL)
      if: matrix.language == 'java-kotlin'
      run: |
        # We run the build script. It might fail on signing but CodeQL
        # will have observed the compilation by then.
        npm run android:build -- --verbose || true

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
