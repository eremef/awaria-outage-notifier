<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title data-i18n="title">Outage Alerts</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <button id="settings-btn" class="settings-btn" title="Settings"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
        <header>
            <h1 data-i18n="title">Outage Alerts</h1>
            <p class="last-updated-row">
                <span id="last-updated" data-i18n="checking_updates">Checking for updates...</span>
                <button id="refresh-btn" class="refresh-btn" title="Refresh">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                </button>
            </p>
        </header>

        <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-title" data-i18n="settings_appearance">Appearance</div>
            <div class="settings-field">
                <label for="theme-select" data-i18n="settings_theme">Theme</label>
                <select id="theme-select">
                    <option value="system" data-i18n="theme_system">System Default</option>
                    <option value="light" data-i18n="theme_light">Light</option>
                    <option value="dark" data-i18n="theme_dark">Dark</option>
                    <option value="monochrome-light" data-i18n="theme_monochrome_light">Monochrome (Light)</option>
                    <option value="monochrome-dark" data-i18n="theme_monochrome_dark">Monochrome (Dark)</option>
                    <option value="emerald" data-i18n="theme_emerald">Emerald (Light)</option>
                    <option value="ocean" data-i18n="theme_ocean">Ocean (Dark)</option>
                    <option value="nord" data-i18n="theme_nord">Nord (Arctic)</option>
                    <option value="dracula" data-i18n="theme_dracula">Dracula (Vampire)</option>
                    <option value="sepia" data-i18n="theme_sepia">Sepia (Warm Light)</option>
                    <option value="latte" data-i18n="theme_latte">Latte (Pastel Light)</option>
                </select>
            </div>
            
            <div class="settings-field">
                <label for="language-select" data-i18n="settings_language">Language</label>
                <select id="language-select">
                    <option value="system" data-i18n="lang_system">System Default</option>
                    <option value="en" data-i18n="lang_en">English</option>
                    <option value="pl" data-i18n="lang_pl">Polski</option>
                </select>
            </div>

            <div class="settings-title" data-i18n="settings_sources">Alert Sources</div>
            <div class="settings-field-group">
                <div class="settings-group-label" data-i18n="source_power">Power</div>
                <div class="settings-field-row indent">
                    <input type="checkbox" id="source-tauron-check" checked>
                    <label for="source-tauron-check" data-i18n="source_tauron_name">Tauron</label>
                </div>
                <div class="settings-field-row indent">
                    <input type="checkbox" id="source-fortum-check" checked>
                    <label for="source-fortum-check" data-i18n="source_fortum_name">Fortum</label>
                </div>
            </div>
            <div class="settings-field-group">
                <div class="settings-group-label" data-i18n="source_water_name">Water</div>
                <div class="settings-field-row indent">
                    <input type="checkbox" id="source-water-check" checked>
                    <label for="source-water-check" data-i18n="source_water_short">MPWiK</label>
                </div>
            </div>

            <div id="location-settings-collapsible" class="collapsible">
                <div class="settings-title collapsible-trigger" data-i18n="settings_location">
                    <span>Location Settings</span>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="collapsible-content">
                    <div class="settings-field">
                        <label for="city-input" data-i18n="settings_city">City</label>
                        <input type="text" id="city-input" data-i18n="settings_city_placeholder" placeholder="e.g. Wrocław">
                    </div>
                    <div class="settings-field">
                        <label for="street-input" data-i18n="settings_street">Street</label>
                        <input type="text" id="street-input" data-i18n="settings_street_placeholder" placeholder="e.g. Kuźnicza">
                    </div>
                    <div class="settings-field">
                        <label for="house-input" data-i18n="settings_house">House No</label>
                        <input type="text" id="house-input" data-i18n="settings_house_placeholder" placeholder="e.g. 25">
                    </div>
                    <div id="settings-status" class="settings-status"></div>
                    <button id="save-settings-btn" class="save-btn" data-i18n="settings_save">Save & Lookup</button>
                </div>
            </div>
        </div>

        <div id="pull-indicator" class="pull-indicator" data-i18n="refresh_pull">↻ Release to refresh</div>

        <main id="outages-container">
            <div class="loading" data-i18n="loading_data">Loading alert data...</div>
        </main>
    </div>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
</body>

</html>
